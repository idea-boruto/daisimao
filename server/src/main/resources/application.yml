spring:
  application:
    name: daisimao
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:classpath:application-secret.yml

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/daisimao?useSSL=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:daisimao-dev-jwt-secret-key-2026-must-be-at-least-256-bits-long}
  expiration: 604800000  # 7 days

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

sms:
  aliyun:
    access-key-id: ${SMS_ACCESS_KEY_ID:}
    access-key-secret: ${SMS_ACCESS_KEY_SECRET:}
    sign-name: ${SMS_SIGN_NAME:代事猫}
    template-code: ${SMS_TEMPLATE_CODE:}

logging:
  level:
    com.daisimao: DEBUG
    org.springframework.security: INFO
